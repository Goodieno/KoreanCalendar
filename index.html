<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tapdong TV Calendar</title>

<style>

/* ================= BASIC ================= */

body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: #0f172a;
    color: white;
}

.container {
    display: grid;
    grid-template-columns: 3fr 1fr;
    height: 100vh;
}

/* ================= CALENDAR ================= */

.calendar {
    padding: 30px;
}

.header {
    text-align: center;
    font-size: 48px;
    margin-bottom: 20px;
}

.weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    font-size: 34px;
    font-weight: bold;
}

.weekdays div {
    padding: 10px;
}

.sun { color: red; }
.sat { color: #60a5fa; }

.days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    grid-auto-rows: 110px;
    gap: 6px;
    margin-top: 10px;
}

.day {
    background: #1e293b;
    border-radius: 12px;
    padding: 10px;
    position: relative;
    font-size: 34px;
}

.day.red {
    color: red;
}

.holiday {
    font-size: 16px;
    margin-top: 4px;
    color: #f87171;
}

/* ================= TODAY PULSE ================= */

.today {
    border: 4px solid red;
    box-shadow: 0 0 20px red;
    animation: pulse 1.5s infinite;
}

.today::after {
    content: "";
    position: absolute;
    width: 26px;
    height: 26px;
    border: 4px solid red;
    border-radius: 50%;
    top: 6px;
    right: 6px;
}

@keyframes pulse {
    0% { box-shadow: 0 0 5px red; }
    50% { box-shadow: 0 0 40px red; }
    100% { box-shadow: 0 0 5px red; }
}

/* ================= SIDEBAR ================= */

.sidebar {
    background: #020617;
    padding: 25px;
    display: flex;
    flex-direction: column;
}

.clock {
    text-align: center;
    font-size: 56px;
    margin-bottom: 25px;
}

.info-box {
    background: #1e293b;
    padding: 18px;
    border-radius: 15px;
    margin-bottom: 15px;
}

.info-box h3 {
    margin: 0 0 8px;
    font-size: 22px;
    text-align: center;
}

.info-box p {
    margin: 5px 0;
    font-size: 20px;
    text-align: center;
}

/* Timer Styles */
#timerContainer {
    text-align: center;
    margin-bottom: 15px;
}
#timerCanvas {
    background: transparent;
}
#periodLabel {
    font-size: 24px;
    font-weight: bold;
    margin-top: -10px;
    display: block;
}

/* Video */

.video-box {
    margin-top: auto;
}

.video-box iframe {
    width: 100%;
    height: 200px;
    border-radius: 12px;
    border: none;
}

.footer {
    text-align:center;
    font-size:14px;
    opacity:0.6;
    margin-top:8px;
}

</style>
</head>

<body>

<div class="container">

<div class="calendar">

    <div class="header" id="monthYear"></div>

    <div class="weekdays">
        <div class="sun">일</div>
        <div>월</div>
        <div>화</div>
        <div>수</div>
        <div>목</div>
        <div>금</div>
        <div class="sat">토</div>
    </div>

    <div class="days" id="days"></div>

</div>

<div class="sidebar">

    <div>

        <div class="clock" id="clock"></div>

        <div class="info-box">
            <h3>🌤 Weather</h3>
            <p id="weather">Loading...</p>
        </div>

        <div class="info-box">
            <h3>😷 Air Quality</h3>
            <p id="air">Loading...</p>
        </div>

    </div>

    <div id="timerContainer">
        <canvas id="timerCanvas" width="220" height="220"></canvas>
        <span id="periodLabel"></span>
    </div>

    <div class="info-box video-box">

            <h3>📺 안내 영상</h3>

     <iframe
         src="https://www.youtube.com/embed/EZFLPCqa3tI?autoplay=1&mute=1&loop=1&playlist=EZFLPCqa3tI"
         title="YouTube video player"
         frameborder="0"
         allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
         referrerpolicy="strict-origin-when-cross-origin"
         allowfullscreen>
     </iframe>

        </div>

    <div style="text-align:center;font-size:14px;opacity:0.6; padding-top: 10px;">
        Dangjin • Korea
    </div>

    </div>

</div>

<script>

/* ================= SETTINGS ================= */

const API_KEY = "fa9fe37b9be14839fe6774643939e974";

const blocks = [
    { type: "prep", label: "준비 시간", start: "08:30", end: "09:00" },
    { type: "class", label: "1교시", start: "09:00", end: "09:40" },
    { type: "break", label: "쉬는 시간", start: "09:40", end: "09:50" },
    { type: "class", label: "2교시", start: "09:50", end: "10:30" },
    { type: "break", label: "쉬는 시간", start: "10:30", end: "10:40" },
    { type: "class", label: "3교시", start: "10:40", end: "11:20" },
    { type: "lunch", label: "점심 시간", start: "11:20", end: "12:20" },
    { type: "class", label: "4교시", start: "12:20", end: "13:00" },
    { type: "break", label: "쉬는 시간", start: "13:00", end: "13:10" },
    { type: "class", label: "5교시", start: "13:10", end: "13:50" },
    { type: "break", label: "쉬는 시간", start: "13:50", end: "14:00" },
    { type: "class", label: "6교시", start: "14:00", end: "14:40" },
    { type: "prep", label: "업무 시간", start: "14:40", end: "16:30" }
];

/* ================= DATE ================= */

let now = new Date();
let month = now.getMonth();
let year = now.getFullYear();
const today = new Date();

/* ================= HOLIDAYS ================= */

let holidays = {};

/* ================= CALENDAR ================= */

function renderCalendar() {

    const daysEl = document.getElementById("days");
    const header = document.getElementById("monthYear");

    daysEl.innerHTML = "";

    const firstDay = new Date(year, month, 1).getDay();
    const lastDate = new Date(year, month + 1, 0).getDate();

    header.textContent = `${year}년 ${month + 1}월`;

    for (let i = 0; i < firstDay; i++) {
        daysEl.appendChild(document.createElement("div"));
    }

    for (let day = 1; day <= lastDate; day++) {

        const cell = document.createElement("div");
        cell.classList.add("day");

        const dateStr =
            `${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;

        cell.innerHTML = `<div>${day}</div>`;

        if ((firstDay + day - 1) % 7 === 0) {
            cell.classList.add("red");
        }

        if (
            day === today.getDate() &&
            month === today.getMonth() &&
            year === today.getFullYear()
        ) {
            cell.classList.add("today");
        }

        if (holidays[dateStr]) {

            cell.classList.add("red");

            holidays[dateStr].forEach(name => {
                const h = document.createElement("div");
                h.className = "holiday";
                h.textContent = name;
                cell.appendChild(h);
            });
        }

        daysEl.appendChild(cell);
    }
}

/* ================= HOLIDAYS ================= */

async function loadHolidays() {

    try {

        const res = await fetch(
            `https://date.nager.at/api/v3/PublicHolidays/${year}/KR`
        );

        const data = await res.json();

        holidays = {};

        data.forEach(h => {

            if (!holidays[h.date]) {
                holidays[h.date] = [];
            }

            holidays[h.date].push(h.localName);
        });

        renderCalendar();

    } catch {
        renderCalendar();
    }
}

/* ================= CLOCK & TIMER ================= */

const tCanvas = document.getElementById("timerCanvas");
const tCtx = tCanvas.getContext("2d");
function toMin(t){ let[h,m]=t.split(":"); return h*60+parseInt(m); }

function updateClock() {

    const now = new Date();
    let mins = now.getHours() * 60 + now.getMinutes() + now.getSeconds() / 60;
    
    // Digital Clock text
    let h = now.getHours();
    const m = String(now.getMinutes()).padStart(2,"0");
    const s = String(now.getSeconds()).padStart(2,"0");
    const ampm = h >= 12 ? "PM" : "AM";
    h = h % 12 || 12;
    document.getElementById("clock").textContent = `${h}:${m}:${s} ${ampm}`;

    // Timer Logic
    let pulseFactor = Math.sin(Date.now() / 1000 * Math.PI) * 2; 
    tCtx.clearRect(0, 0, 220, 220);
    
    // Static white background circle
    tCtx.beginPath(); tCtx.arc(110, 110, 95, 0, Math.PI * 2); tCtx.fillStyle = "rgba(255,255,255,0.05)"; tCtx.fill();

    // Clock Face Ticks
    for (let i = 0; i < 60; i++) {
        let angle = i * Math.PI / 30; let isMajor = i % 5 === 0;
        let x1 = 110 + Math.cos(angle) * (90 - (isMajor?10:4)); let y1 = 110 + Math.sin(angle) * (90 - (isMajor?10:4));
        let x2 = 110 + Math.cos(angle) * 90; let y2 = 110 + Math.sin(angle) * 90;
        tCtx.beginPath(); tCtx.moveTo(x1, y1); tCtx.lineTo(x2, y2);
        tCtx.strokeStyle = isMajor ? "#475569" : "#1e293b"; tCtx.lineWidth = isMajor ? 3 : 1; tCtx.stroke();
    }

    let label = "휴식 시간 ✨";
    let color = "#94a3b8";
    let total = 60;
    let remain = 0;

    let active = blocks.find(b => mins >= toMin(b.start) && mins < toMin(b.end));
    if (active) {
        label = active.label;
        color = active.type === "class" ? "#f87171" : (active.type === "prep" ? "#a3e635" : "#fbbf24");
        total = toMin(active.end) - toMin(active.start);
        remain = toMin(active.end) - mins;
    }

    // Pulsing Ring
    if (total > 0) {
        let percent = Math.max(0, Math.min(1, remain / total));
        tCtx.beginPath();
        tCtx.arc(110, 110, 100, -Math.PI / 2, -Math.PI / 2 + (percent * 2 * Math.PI), false);
        tCtx.lineWidth = 8 + pulseFactor; 
        tCtx.strokeStyle = color; tCtx.lineCap = "round"; tCtx.stroke();
    }

    // Time inside Timer
    tCtx.fillStyle = "white"; 
    tCtx.font = "bold 32px Segoe UI"; 
    tCtx.textAlign = "center";
    tCtx.fillText(`${h}:${m}`, 110, 110); // Center slightly higher for AM/PM

    // AM/PM indicator inside Timer
    tCtx.font = "bold 14px Segoe UI";
    tCtx.fillStyle = color; // Colored AM/PM looks sharp
    tCtx.fillText(ampm, 110, 130);

    document.getElementById("periodLabel").textContent = label;
    document.getElementById("periodLabel").style.color = color;

    requestAnimationFrame(updateClock);
}

requestAnimationFrame(updateClock);

/* ================= WEATHER (FIXED) ================= */

async function loadWeather() {

    try {

        const geoRes = await fetch(
            `https://api.openweathermap.org/geo/1.0/direct?q=Dangjin,KR&limit=1&appid=${API_KEY}`
        );

        const geoData = await geoRes.json();

        const lat = geoData[0].lat;
        const lon = geoData[0].lon;

        const res = await fetch(
            `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`
        );

        const data = await res.json();

        document.getElementById("weather").textContent =
            `${data.weather[0].main} / ${data.main.temp.toFixed(1)}°C`;

    } catch {

        document.getElementById("weather").textContent =
            "Unavailable";
    }
}

/* ================= AIR ================= */

async function loadAir() {

    try {

        const geoRes = await fetch(
            `https://api.openweathermap.org/geo/1.0/direct?q=Dangjin,KR&limit=1&appid=${API_KEY}`
        );

        const geoData = await geoRes.json();

        const lat = geoData[0].lat;
        const lon = geoData[0].lon;

        const res = await fetch(
            `https://api.openweathermap.org/data/2.5/air_pollution?lat=${lat}&lon=${lon}&appid=${API_KEY}`
        );

        const data = await res.json();

        const aqi = data.list[0].main.aqi;

        const levels = [
            "Good 😊",
            "Fair 🙂",
            "Moderate 😐",
            "Poor 😷",
            "Very Poor ☠️"
        ];

        document.getElementById("air").textContent =
            levels[aqi-1];

    } catch {

        document.getElementById("air").textContent =
            "Unavailable";
    }
}

/* ================= MIDNIGHT RELOAD ================= */

function scheduleReload() {

    const now = new Date();
    const midnight = new Date();

    midnight.setHours(24,0,0,0);

    setTimeout(() => {
        location.reload();
    }, midnight - now);
}

/* ================= START ================= */

loadHolidays();
loadWeather();
loadAir();
scheduleReload();

setInterval(loadWeather, 600000);
setInterval(loadAir, 600000);

</script>

</body>
</html>
